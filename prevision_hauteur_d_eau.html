<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="300"> <!-- Refresh every 5 minutes -->
<title>Prédictions de Hauteur d'Eau </title>
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
<style>
body {{
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  min-height: 100vh;
  background-color: #f0f0f0;
  height: 100%;
}}
html {{
  height: 100%;
}}
#waterHeightPlot {{
  width: 100%;
  height: 100vh;
  border: none;
  box-shadow: none;
  background-color: white;
}}
</style>
</head>
<body>
    <div id="waterHeightPlot"></div>
    <script>
        console.log("Plotly embedded script started.");
        var embeddedPredictionsData = {embedded_predictions_json}; // Dynamically embedded data from Python

        console.log("embeddedPredictionsData:", embeddedPredictionsData);

        var plotData = [];

        var tracePredictions = {{
            x: embeddedPredictionsData.map(d => d.Date),
            y: embeddedPredictionsData.map(d => d.Water_Height_Predicted_mm),
            mode: 'lines+markers',
            name: "Prédiction Future (Modèle Final Amélioré)",
            line: {{ "color": "purple" }},
            marker: {{ "size": 4 }}
        }};
        plotData.push(tracePredictions);

        var layout = {{
            "title": "<b>Prévisions de hauteur d'Eau pour les 3 prochains jours (Embedded & Auto-rafraîchi)</b>",
            "xaxis": {{ "title": "Date et Heure (UTC)", "type": "date" }},
            "yaxis": {{ "title": "Hauteur d'eau (mm)" }},
            "hovermode": "closest",
            "showlegend": true
        }};

        try {{
            Plotly.newPlot('waterHeightPlot', plotData, layout);
            console.log("Plotly.newPlot executed successfully for embedded predictions.");
        }} catch (e) {{
            console.error("Error rendering embedded Plotly chart:", e);
        }}
    </script>
</body>
</html>
