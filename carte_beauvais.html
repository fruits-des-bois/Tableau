<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
}

/* CONTENEUR GLOBAL */
#map-wrapper {
    position: relative;
    width: 100%;
    height: 100vh;
}

/* CARTE */
#map {
    width: 100%;
    height: 100%;
}

/* BOUTON */
#toggle-map {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 9999;
    background: white;
    padding: 8px 12px;
    border-radius: 6px;
    box-shadow: 0 0 6px rgba(0,0,0,0.3);
    cursor: pointer;
    font-weight: bold;
}

/* FLÈCHE NORD */
#north-arrow {
    position: absolute;
    top: 20px;
    left: 60px;
    z-index: 999;
    font-size: 40px;
    font-weight: bold;
    background: white;
    padding: 6px;
    border-radius: 5px;
}

/* LÉGENDE */
#legend {
    position: absolute;
    bottom: 20px;
    right: 20px;
    z-index: 999;
    background: white;
    padding: 10px 12px;
    border-radius: 8px;
    box-shadow: 0 0 5px rgba(0,0,0,0.3);
    font-size: 14px;
}
</style>

</head>

<body>

<!-- BOUTON -->
<div id="toggle-map">🗺️ Replier / Déplier carte</div>

<!-- WRAPPER -->
<div id="map-wrapper">

    <!-- FLÈCHE NORD -->
    <div id="north-arrow">
        N<br>↑
    </div>

    <!-- CARTE -->
    <div id="map"></div>

    <!-- LÉGENDE -->
    <div id="legend">
        🔵 Station hydrométrique<br>
        🔴 Station météo<br>
        ⬛ Limites de Beauvais
    </div>

</div>

<script>

// =======================
// CARTE
// =======================
var map = L.map('map').setView([49.43612, 2.083986], 12);

//échelle
L.control.scale().addTo(map);
// fond OSM
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

// points
L.circleMarker([49.42612, 2.083986], {
    color: 'blue',
    radius: 6,
    fill: true,
    fillOpacity: 1
}).addTo(map).bindTooltip("Station hydrométrique");

L.circleMarker([49.4465, 2.127167], {
    color: 'red',
    radius: 6,
    fill: true,
    fillOpacity: 1
}).addTo(map).bindTooltip("Station météo");


// =======================
// TOGGLE GLOBAL
// =======================
window.onload = function () {

    const btn = document.getElementById("toggle-map");
    const wrapper = document.getElementById("map-wrapper");

    btn.onclick = function () {

        if (wrapper.style.display === "none") {
            wrapper.style.display = "block";

            // IMPORTANT Leaflet resize
            setTimeout(function () {
                window.dispatchEvent(new Event("resize"));
                map.invalidateSize();
            }, 200);

        } else {
            wrapper.style.display = "none";
        }
    };
};

</script>

</body>
</html>
