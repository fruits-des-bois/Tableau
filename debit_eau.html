<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Débit moyen horaire — H774201001</title>

<style>
h2{
    margin-bottom:15px;
    color:#333;
    font-size:18px;
    font-weight:bold;
}

body{
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
    margin:20px;
}

table{
    border-collapse:collapse;
    width:100%;
    max-width:500px;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
}

th{
    background:#f3f3f3;
    text-align:left;
}

td.txt{
    text-align:left;
}

td.num{
    text-align:right;
}
</style>
</head>

<body>

<h2>Débit d'eau moyen horaire (l/s)</h2>

<table id="tbl">
<thead>
<tr>
    <th>Date (UTC)</th>
    <th>Heure (UTC)</th>
    <th>Débit moyen (l/s)</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const url =
"https://hubeau.eaufrance.fr/api/v2/hydrometrie/observations_tr?code_entite=H774201001&size=30&pretty&grandeur_hydro=Q&fields=date_obs,resultat_obs";

fetch(url)

.then(r => r.json())

.then(j => {

    const tbody = document.querySelector("#tbl tbody");

    // Mesures 6 à 30 (on ignore les 5 plus récentes)
    const mesures = j.data.slice(10, 30);

    const groupes = {};

    mesures.forEach(it => {

        if (it.resultat_obs == null) return;

        const dt = new Date(it.date_obs);

        const cle =
            dt.getUTCFullYear() + "-" +
            String(dt.getUTCMonth() + 1).padStart(2, "0") + "-" +
            String(dt.getUTCDate()).padStart(2, "0") + " " +
            String(dt.getUTCHours()).padStart(2, "0");

        if (!groupes[cle]) {
            groupes[cle] = {
                date: dt,
                somme: 0,
                nb: 0
            };
        }

        groupes[cle].somme += Number(it.resultat_obs);
        groupes[cle].nb++;
    });

    const moyennes = Object.values(groupes)
        .map(g => ({
            date: g.date,
            moyenne: g.somme / g.nb
        }))
        .sort((a, b) => b.date - a.date)
        .slice(0, 5);

    moyennes.forEach(item => {

        const tr = document.createElement("tr");

        const date_part = item.date.toISOString().split("T")[0];

        const heure_part =
            String(item.date.getUTCHours()).padStart(2, "0") +
            ":00:00";

        tr.innerHTML = `
            <td class="txt">${date_part}</td>
            <td class="txt">${heure_part}</td>
            <td class="num">${item.moyenne.toFixed(0)}</td>
        `;

        tbody.appendChild(tr);
    });

})

.catch(e => {

    document.querySelector("#tbl tbody").innerHTML =
        `<tr><td colspan="3">Erreur : ${e.message}</td></tr>`;

});

</script>

</body>
</html>
